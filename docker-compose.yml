services:
  postgres:
    image: postgres:16-alpine
    container_name: wreny
    restart: unless-stopped
    ports:
      - "5442:5432"
    environment:
      POSTGRES_DB: wreny
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wreny"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
